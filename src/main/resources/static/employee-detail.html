<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employee Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <main class="max-w-5xl mx-auto p-6">
      <header class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-3xl font-bold text-slate-900">Employee Detail</h1>
          <p class="text-sm text-slate-600">Review the saved employee and upload supporting documents.</p>
        </div>
        <a class="bg-slate-800 text-white px-4 py-2 rounded" href="/index.html">Back</a>
      </header>

      <section class="bg-white p-6 rounded shadow mb-6">
        <div id="employeeSummary" class="grid md:grid-cols-2 gap-4"></div>
      </section>

      <section class="bg-white p-6 rounded shadow mb-6">
        <h2 class="text-xl font-semibold mb-4">Upload Documents</h2>
        <form id="documentForm" class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium">Document Name</label>
            <input name="documentName" placeholder="Offer letter, ID proof, resume" class="mt-1 block w-full border rounded p-2" />
          </div>
          <div>
            <label class="block text-sm font-medium">Document File</label>
            <input name="document" required type="file" class="mt-1" />
          </div>
          <div class="md:col-span-2 flex items-center gap-3">
            <button class="bg-blue-600 text-white px-4 py-2 rounded" type="submit">Upload Document</button>
            <span id="documentStatus" class="text-sm text-slate-600"></span>
          </div>
        </form>
      </section>

      <section class="bg-white p-6 rounded shadow">
        <h2 class="text-xl font-semibold mb-4">Saved Documents</h2>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead>
              <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Size</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Uploaded</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">File</th>
              </tr>
            </thead>
            <tbody id="documentsBody" class="bg-white divide-y divide-gray-200"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      if (!sessionStorage.getItem('employeeUser')) {
        window.location.href = '/login.html';
      }

      const params = new URLSearchParams(window.location.search);
      const employeeId = params.get('id');
      const summary = document.getElementById('employeeSummary');
      const documentStatus = document.getElementById('documentStatus');

      function field(label, value) {
        return `<div><div class="text-xs uppercase text-slate-500">${label}</div><div class="text-slate-900 break-words">${value || ''}</div></div>`;
      }

      function renderSummary(employee) {
        summary.innerHTML = [
          field('ID', employee.id),
          field('Name', employee.name),
          field('Email', employee.email),
          field('Department', employee.department),
          field('Tenant ID', employee.customTenantId),
          field('Internal Code', employee.internalCode),
          field('Profile Picture', employee.profilePicturePath ? `<a class="text-blue-600 underline" href="/uploads/${employee.profilePicturePath}" target="_blank">Open profile picture</a>` : '')
        ].join('');
      }

      async function loadEmployee() {
        const cached = sessionStorage.getItem('lastEmployee');
        if (cached) {
          const employee = JSON.parse(cached);
          if (String(employee.id) === String(employeeId)) {
            renderSummary(employee);
          }
        }

        const res = await fetch(`/api/employees/${employeeId}`);
        if (!res.ok) {
          summary.innerHTML = '<p class="text-red-600">Employee not found.</p>';
          return;
        }
        renderSummary(await res.json());
      }

      async function loadDocuments() {
        const res = await fetch(`/api/employees/${employeeId}/documents`);
        const data = await res.json();
        const body = document.getElementById('documentsBody');
        body.innerHTML = '';
        data.forEach(doc => {
          const uploaded = doc.uploadedAt ? new Date(doc.uploadedAt).toLocaleString() : '';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-4 py-3">${doc.id}</td>
            <td class="px-4 py-3">${doc.documentName || ''}</td>
            <td class="px-4 py-3">${doc.contentType || ''}</td>
            <td class="px-4 py-3">${doc.sizeBytes || 0}</td>
            <td class="px-4 py-3">${uploaded}</td>
            <td class="px-4 py-3">${doc.documentPath ? `<a class="text-blue-600 underline" href="/uploads/${doc.documentPath}" target="_blank">open</a>` : ''}</td>
          `;

          //Uncomment to test CWE-94 DOM Injection with barriers
          // tr.innerHTML = DOMPurify.sanitize(`
          //   <td class="px-4 py-3">${doc.id}</td>
          //   <td class="px-4 py-3">${doc.documentName || ''}</td>
          //   <td class="px-4 py-3">${doc.contentType || ''}</td>
          //   <td class="px-4 py-3">${doc.sizeBytes || 0}</td>
          //   <td class="px-4 py-3">${uploaded}</td>
          //   <td class="px-4 py-3">
          //     ${doc.documentPath
          //       ? `<a class="text-blue-600 underline" href="/uploads/${encodeURIComponent(doc.documentPath)}" target="_blank">open</a>`
          //       : ''}
          //   </td>
          // `);
          body.appendChild(tr);
        });
      }

      document.getElementById('documentForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const form = event.target;
        const fd = new FormData(form);
        documentStatus.textContent = 'Uploading document...';
        const res = await fetch(`/api/employees/${employeeId}/documents`, { method: 'POST', body: fd });
        if (res.ok) {
          form.reset();
          documentStatus.textContent = 'Document saved.';
          loadDocuments();
        } else {
          documentStatus.textContent = 'Document upload failed.';
        }
      });

      if (!employeeId) {
        summary.innerHTML = '<p class="text-red-600">Missing employee id.</p>';
      } else {
        loadEmployee();
        loadDocuments();
      }
    </script>
  </body>
</html>
